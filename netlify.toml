# Netlify deployment config for dodsmarthealth.com

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Redirect www to non-www
[[redirects]]
  from = "https://www.dodsmarthealth.com/*"
  to   = "https://dodsmarthealth.com/:splat"
  status = 301
  force  = true

# Admin panel route
[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

# SPA fallback (keep last)
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
